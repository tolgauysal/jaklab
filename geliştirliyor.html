<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geliştiriliyor</title>
    <style>
        /* Sayfa merkezleme ve karanlık modern arka plan */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #0d1b2a 0%, #050b14 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Fotoğraftaki yuvarlak, eğimli fütüristik ekran paneli */
        .ekran-konteyner {
            position: relative;
            width: 600px;
            height: 250px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            border-radius: 20px;
            border: 2px solid rgba(0, 212, 255, 0.3); /* Fotoğraftaki mavi siber çizgi */
            box-shadow: 
                0 0 30px rgba(0, 212, 255, 0.15), 
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px); /* Cam efekti (Glassmorphism) */
            display: flex;
            justify-content: center;
            align-items: center;
            transform: perspective(800px) rotateX(15px); /* Fotoğraftaki yatay eğim açısı */
            transition: all 0.5s ease;
        }

        /* Ekranın altındaki parlayan siber ışık halkası efekti */
        .ekran-konteyner::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 5%;
            width: 90%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, transparent);
            box-shadow: 0 0 15px #00d4ff;
            filter: blur(1px);
        }

        /* Fotoğraftaki özel yazı stili ve neon parlaması */
        .gelistiriliyor-yazi {
            color: #ffffff;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 
                0 0 10px rgba(0, 212, 255, 0.6),
                0 0 20px rgba(0, 212, 255, 0.4),
                0 0 40px rgba(0, 212, 255, 0.2);
            animation: nefesAl 3s ease-in-out infinite;
            user-select: none;
        }

        /* Yazıya hafif canlılık katacak fütüristik parlama animasyonu */
        @keyframes nefesAl {
            0%, 100% {
                opacity: 0.9;
                text-shadow: 0 0 10px rgba(0, 212, 255, 0.6), 0 0 20px rgba(0, 212, 255, 0.4);
            }
            50% {
                opacity: 1;
                text-shadow: 0 0 15px rgba(0, 212, 255, 0.9), 0 0 30px rgba(0, 212, 255, 0.6), 0 0 50px rgba(0, 212, 255, 0.4);
            }
        }
    </style>
</head>
<body>

    <!-- Sadece fotoğrafın merkezindeki teknolojik panel ekranı -->
    <div class="ekran-konteyner">
        <div class="gelistiriliyor-yazi">Geliştiriliyor</div>
    </div>

</body>
</html>
